<div class="signup-form">
    <div class="home-btn-container home-icon" (click)="goHome()">
        <!-- <i routerLink="/" class="fa-solid fa-home home-btn"></i> -->
        <svg class="home-btn" xmlns="http://www.w3.org/2000/svg" viewBox="-7 -8 40 40" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </div>
    <div class="container">
        <h1>Sign Up</h1>
        <div class="main">
            <div class="form-img">
                <img src="signupp.gif" alt="User Animation" />
            </div>
            <div class="content">
                <h2>Create Account</h2>
                <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input formControlName="username" type="text" id="username" placeholder="Enter your username" />
                        <div class="error-msg"
                            *ngIf="signupForm.get('username')?.touched && signupForm.get('username')?.invalid">
                            <small *ngIf="signupForm.get('username')?.errors?.['required']">
                                Username is required
                            </small>
                            <small *ngIf="signupForm.get('username')?.errors?.['minlength']">
                                Username must be at least 3 characters
                            </small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input formControlName="email" type="email" id="email" placeholder="Enter your email" />
                        <div class="error-msg"
                            *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.invalid">
                            <small *ngIf="signupForm.get('email')?.errors?.['required']">
                                Email is required
                            </small>
                            <small *ngIf="signupForm.get('email')?.errors?.['email']">
                                Please enter a valid email
                            </small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input formControlName="password" type="password" id="password"
                            placeholder="Enter your password" />
                        <div class="error-msg"
                            *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid">
                            <small *ngIf="signupForm.get('password')?.errors?.['required']">
                                Password is required
                            </small>
                            <small *ngIf="signupForm.get('password')?.errors?.['minlength']">
                                Password must be at least 8 characters
                            </small>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input formControlName="confirmPassword" type="password" id="confirmPassword"
                            placeholder="Confirm your password" />
                        <div class="error-msg" *ngIf="signupForm.get('confirmPassword')?.touched && 
                                   (signupForm.get('confirmPassword')?.invalid || signupForm.hasError('mismatch'))">
                            <small *ngIf="signupForm.get('confirmPassword')?.errors?.['required']">
                                Please confirm your password
                            </small>
                            <small *ngIf="signupForm.hasError('mismatch')">
                                Passwords do not match
                            </small>
                        </div>
                    </div>

                    <button type="submit" [disabled]="signupForm.invalid || isLoading">
                        <span *ngIf="!isLoading">Sign Up</span>
                        <mat-spinner *ngIf="isLoading" [diameter]="20"></mat-spinner>
                    </button>

                    <div class="login-prompt">
                        <p>Already have an account? <a routerLink="/login">Login here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
