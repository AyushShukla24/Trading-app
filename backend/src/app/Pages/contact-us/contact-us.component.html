<div class="contact-container">
    <div class="contact-header">
      <div class="home-icon" (click)="navigateHome()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </div>
      <h2 class="contact-title">Contact Crypto Support</h2>
    </div>
    
    <div class="contact-card">
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input 
              type="text" 
              id="firstName"
              formControlName="firstName"
              placeholder="First Name"
              required
            >
            <div *ngIf="contactForm.get('firstName')?.invalid && contactForm.get('firstName')?.touched" class="error-message">
              First Name is required
            </div>
          </div>

          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input 
              type="text" 
              id="lastName"
              formControlName="lastName"
              placeholder="Last Name"
              required
            >
            <div *ngIf="contactForm.get('lastName')?.invalid && contactForm.get('lastName')?.touched" class="error-message">
              Last Name is required
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="email" 
              id="email"
              formControlName="email"
              placeholder="your.email@example.com"
              required
            >
            <div *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched" class="error-message">
              Valid email is required
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input 
              type="tel" 
              id="phone"
              formControlName="phone"
              placeholder="9876543210"
              required
            >
            <div *ngIf="contactForm.get('phone')?.invalid && contactForm.get('phone')?.touched" class="error-message">
              Valid phone number is required
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="supportType">Support Category</label>
          <select 
            id="supportType"
            formControlName="supportType"
            required
          >
            <option value="">Select Support Type</option>
            <option value="trading">Trading Support</option>
            <!-- <option value="wallet">Wallet Issues</option> -->
            <option value="account">Account Management</option>
            <option value="security">Security Concerns</option>
            <option value="other">Other</option>
          </select>
          <div *ngIf="contactForm.get('supportType')?.invalid && contactForm.get('supportType')?.touched" class="error-message">
            Please select a support category
          </div>
        </div>

        <div class="form-group">
          <label for="message">Detailed Description</label>
          <textarea 
            id="message"
            formControlName="message"
            placeholder="Describe your issue or inquiry in detail"
            rows="5"
            required
          ></textarea>
          <div *ngIf="contactForm.get('message')?.invalid && contactForm.get('message')?.touched" class="error-message">
            Please provide a detailed description
          </div>
        </div>

        <div class="form-row checkbox-row">
          <div class="checkbox-group">
            <input 
              type="checkbox"
              id="urgentMatter"
              formControlName="urgentMatter"
              class="checkbox-input"
            >
            <label for="urgentMatter" class="checkbox-label">
              This is an urgent matter
            </label>
          </div>
        </div>

        <button 
          type="submit" 
          class="submit-btn"
          [disabled]="contactForm.invalid"
        >
          Submit Support Request
        </button>
      </form>
    </div>
  </div>
