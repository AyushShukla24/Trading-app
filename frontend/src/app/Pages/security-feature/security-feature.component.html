<div class="feature">
    <i [class]="icon"></i>
    <h2>{{ title }}</h2>
    <p>{{ description }}</p>
    <!-- Show additional info when expanded -->
    <div *ngIf="isExpanded" class="more-info">
        <p>{{ moreInfo }}</p>
    </div>

    <!-- Button to toggle details -->
    <button (click)="toggleDetails()" class="more-info-button">
        {{ isExpanded ? 'Show Less' : 'Show More' }}
    </button>
</div>
