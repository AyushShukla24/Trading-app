<div class="buy-modal">
    <div class="modal-header">
      <div class="stock-info">
        <img [src]="data.image" [alt]="data.name" class="stock-logo">
        <div class="stock-details">
          <h2>{{data.name}}</h2>
          <span class="symbol">{{data.symbol}}</span>
        </div>
      </div>
      <button class="close-button" (click)="close()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="order-type-toggle">
      <button 
        [class.active]="!isLimitOrder" 
        (click)="isLimitOrder = false">
        Market Order
      </button>
      <button 
        [class.active]="isLimitOrder" 
        (click)="isLimitOrder = true">
        Limit Order
      </button>
    </div>

    <div class="order-section" [class.hidden]="isLimitOrder">
      <div class="price-display">
        <span class="label">Current Price</span>
        <span class="value">{{data.currentPrice | currency}}</span>
      </div>
      
      <div class="input-group">
        <label>Amount</label>
        <input 
          type="number" 
          [(ngModel)]="quantity" 
          (input)="calculateTotal()"
          min="0" 
          step="0.01">
      </div>

      <div class="total-section">
        <span>Total</span>
        <span class="total-amount">{{total | currency}}</span>
      </div>
    </div>

    <div class="order-section" [class.hidden]="!isLimitOrder">
      <div class="input-group">
        <label>Limit Price</label>
        <input 
          type="number" 
          [(ngModel)]="limitPrice" 
          (input)="calculateTotal()"
          [min]="0" 
          step="0.01">
      </div>

      <div class="input-group">
        <label>Amount</label>
        <input 
          type="number" 
          [(ngModel)]="quantity" 
          (input)="calculateTotal()"
          min="0" 
          step="0.01">
      </div>

      <div class="total-section">
        <span>Total</span>
        <span class="total-amount">{{total | currency}}</span>
      </div>
    </div>

    <button class="buy-button" (click)="placeBuyOrder()">
      <span>Place Buy Order</span>
      <span>{{total | currency}}</span>
    </button>
  </div>
